name: PHP Composer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v5.0.5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    # Add a test script to composer.json, for instance: "test": "vendor/bin/phpunit"
    # Docs: https://getcomposer.org/doc/articles/scripts.md

    - name: PHPUnit (php-actions)
      # You may pin to the exact commit or the version.
      uses: php-actions/phpunit@v4
      # uses: php-actions/phpunit@v4
      with:
        # What version of PHP to use
        php_version: "8.5"

    - name: PHP Code Sniffer (php-actions)
      # You may pin to the exact commit or the version.
      uses: php-actions/phpcs@v1.0.1
      # uses: php-actions/phpcs@v1
      with:
        # What version of PHP to use
        php_version: "8.5"
        # Path to a vendored phpcs binary
        # vendored_phpcs_path: # optional
        # One or more files and/or directories to check
        path: "src"
        # The name or path of the coding standard to use
        standard: "PSR12"
